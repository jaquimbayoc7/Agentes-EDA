# Configuración central del pipeline EDA Agents
# Todos los umbrales y parámetros centralizados aquí

random_seed: 42
model: claude-sonnet-4-5
max_tokens: 4096

imbalance_thresholds:
  oversample: 3       # ratio < 1:3 → sin balanceo
  hybrid: 10           # ratio 1:3 a 1:10 → oversample
  undersample: 30      # ratio 1:10 a 1:30 → hybrid; > 1:30 → undersample

vif_threshold: 10
bp_pvalue: 0.05
max_rows_profiling: 100000

encoding:
  ohe_max_categories: 3

split:
  test_size: 0.2
  stratify: true
